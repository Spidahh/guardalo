<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GUARDALO — La guida agli anime, livello dopo livello</title>
    <meta name="description" content="Non un catalogo, una guida. Percorsi curati a livelli che ti accompagnano nel mondo degli anime: dai primi passi ai capolavori. Schede senza spoiler, durata reale, dove vederlo.">

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#16130e">

    <!-- AdSense — al lancio: incolla qui lo script con il tuo publisher id e crea /ads.txt
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous"></script>
    -->

    <!-- Social / Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="GUARDALO — La guida agli anime, livello dopo livello">
    <meta property="og:description" content="Percorsi curati a livelli: dai primi passi ai capolavori. Schede senza spoiler, durata reale, dove vederlo.">
    <meta property="og:image" content="icon.svg">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=10.7">

    <!-- Applica il tema salvato prima del render (niente flash) -->
    <script>
        try { document.documentElement.dataset.theme = localStorage.getItem('guardalo_theme') || 'dark'; }
        catch (e) { document.documentElement.dataset.theme = 'dark'; }
    </script>
</head>
<body>

    <!-- NAVBAR -->
    <header class="nav">
        <div class="nav-in">
            <a class="brand" href="#/" aria-label="GUARDALO — home">
                <span class="brand-mark">G</span>
                <span class="brand-word">GUARDALO</span>
            </a>

            <nav class="nav-links" id="navLinks">
                <a href="#/" data-route="home"><i class="ri-route-line"></i><span>Percorsi</span></a>
                <a href="#/esplora" data-route="esplora"><i class="ri-compass-3-line"></i><span>Esplora</span></a>
                <a href="#/lista" data-route="lista"><i class="ri-bookmark-line"></i><span>La mia lista</span></a>
            </nav>

            <div class="nav-right">
                <button id="searchOpen" class="icon-btn" title="Cerca (/)" aria-label="Cerca"><i class="ri-search-line"></i></button>
                <button id="themeToggle" class="icon-btn" title="Tema chiaro/scuro" aria-label="Cambia tema"><i class="ri-contrast-2-line"></i></button>
                <span id="adminBadge" class="admin-badge" hidden><i class="ri-shield-star-fill"></i></span>
                <span id="userChip" class="user-chip" hidden></span>
                <button id="loginBtn" class="btn-ghost"><i class="ri-user-line"></i><span>Accedi</span></button>
                <button id="logoutBtn" class="icon-btn" title="Esci" aria-label="Esci" hidden><i class="ri-logout-box-r-line"></i></button>
            </div>
        </div>
    </header>

    <!-- CONTENUTO (renderizzato dal router) -->
    <main id="app" class="app"></main>

    <!-- FOOTER -->
    <footer class="foot">
        <div class="foot-in">
            <span class="foot-brand">GUARDALO</span>
            <span class="foot-attr" id="footAttr"></span>
            <span class="foot-note">Una guida, non un catalogo · Dati e copertine da AniList</span>
        </div>
    </footer>

    <!-- OVERLAY RICERCA -->
    <div id="searchOverlay" class="search-overlay" hidden>
        <div class="search-panel">
            <div class="search-bar">
                <i class="ri-search-line"></i>
                <input id="searchInput" type="text" placeholder="Cerca un titolo, uno studio, un'atmosfera…" autocomplete="off">
                <button id="searchClose" class="icon-btn" aria-label="Chiudi"><i class="ri-close-line"></i></button>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="overlay">
        <div class="sheet sheet-sm">
            <button class="sheet-x" id="loginClose" aria-label="Chiudi"><i class="ri-close-line"></i></button>
            <div class="login-body">
                <span class="brand-mark brand-mark-lg">G</span>
                <h2>Accedi a GUARDALO</h2>
                <p>Salva i tuoi progressi e ritrovali su ogni dispositivo. Sfogliare la guida non richiede account.</p>
                <button id="googleLogin" class="btn-google"><i class="ri-google-fill"></i> Continua con Google</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toasts" class="toasts"></div>

    <!-- Firebase (auth + sync opzionale) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js?v=10.7"></script>

    <!-- PWA: cache dell'app shell -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
