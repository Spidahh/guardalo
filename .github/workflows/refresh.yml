name: Refresh dati AniList

# Ripesca i dati reali da AniList e rigenera il dataset. Il runtime resta statico:
# le API si chiamano qui (ogni tanto), non a ogni utente — così si rispettano i rate limit.
on:
  schedule:
    - cron: '0 5 * * 1'        # ogni lunedì alle 05:00 UTC
  workflow_dispatch: {}         # avvio manuale dalla tab Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch + genera
        run: |
          node tools/build.mjs fetch
          node tools/build.mjs gen
      - name: Commit se ci sono aggiornamenti
        run: |
          git config user.name "guardalo-bot"
          git config user.email "actions@users.noreplygithub.com"
          git add sources/anime.json dist/data.json js/data.js
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento."
          else
            git commit -m "chore: refresh dati AniList [skip ci]"
            git push
          fi
